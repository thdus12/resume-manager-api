server:
  port: 8005

spring:
  application:
    name: resume-manager-api
  profiles:
    active: local
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            scope: profile_nickname, account_email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            scope: name, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resume_manager}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:q1w2e3r4!!}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

jwt:
  profiles:
    user:
      endpoint: /api
      names:
        access-token: accessToken
        refresh-token: refreshToken
        anonymous-token: anonymousToken
      keys:
        secret: ${JWT_SECRET:resume-manager-jwt-secret-key-must-be-at-least-32-characters-long}
        anonymous-secret: ${JWT_ANONYMOUS_SECRET:resume-manager-anon-secret-key-must-be-at-least-32-chars}
      expires:
        access-token-expiry: PT1H
        refresh-token-expiry: P7D
        anonymous-token-expiry: PT24H
  allow-paths:
    - /auth
    - /oauth2
    - /login

chacha20:
  pepper: ${CHACHA20_PEPPER:resume-manager-pepper-value-32ch}
  password: ${CHACHA20_PASSWORD:resume-manager-password-value32c}

claude:
  api:
    key: ${CLAUDE_API_KEY:}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    com.resumemanager: debug
    root: info
